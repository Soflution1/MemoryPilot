  <line x1="100" y1="80" x2="660" y2="80" stroke="white" stroke-opacity="0.08"/>
  <line x1="100" y1="166.7" x2="660" y2="166.7" stroke="white" stroke-opacity="0.06"/>
  <line x1="100" y1="253.3" x2="660" y2="253.3" stroke="white" stroke-opacity="0.06"/>
  <line x1="100" y1="340" x2="660" y2="340" stroke="white" stroke-opacity="0.08"/>

  <text x="90" y="84" text-anchor="end" fill="white" font-size="11" opacity="0.5">100%</text>
  <text x="90" y="170.7" text-anchor="end" fill="white" font-size="11" opacity="0.5">90%</text>
  <text x="90" y="257.3" text-anchor="end" fill="white" font-size="11" opacity="0.5">80%</text>
  <text x="90" y="344" text-anchor="end" fill="white" font-size="11" opacity="0.5">70%</text>

  <text x="193" y="365" text-anchor="middle" fill="white" font-size="12" font-weight="600" opacity="0.7">R@5</text>
  <text x="333" y="365" text-anchor="middle" fill="white" font-size="12" font-weight="600" opacity="0.7">R@10</text>
  <text x="473" y="365" text-anchor="middle" fill="white" font-size="12" font-weight="600" opacity="0.7">NDCG@10</text>
  <text x="613" y="365" text-anchor="middle" fill="white" font-size="12" font-weight="600" opacity="0.7">MRR</text>

  <!-- MemoryPilot area fill -->
  <polygon points="193,106 333,93 473,132 613,145 613,340 193,340" fill="#3b82f6" fill-opacity="0.15"/>
  <!-- MemPalace area fill -->
  <polygon points="193,109.4 333,106 473,175.2 613,187.7 613,340 193,340" fill="#ef4444" fill-opacity="0.08"/>

  <!-- MemPalace line -->
  <polyline points="193,109.4 333,106 473,175.2 613,187.7" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-opacity="0.7" stroke-linejoin="round"/>

  <!-- MemoryPilot line -->
  <polyline points="193,106 333,93 473,132 613,145" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linejoin="round"/>

  <!-- MemoryPilot dots + values -->
  <circle cx="193" cy="106" r="5" fill="#3b82f6" stroke="#0a0a0f" stroke-width="2"/>
  <text x="193" y="96" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">97.0%</text>

  <circle cx="333" cy="93" r="5" fill="#3b82f6" stroke="#0a0a0f" stroke-width="2"/>
  <text x="333" y="83" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">98.5%</text>

  <circle cx="473" cy="132" r="5" fill="#3b82f6" stroke="#0a0a0f" stroke-width="2"/>
  <text x="473" y="122" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">94.0%</text>

  <circle cx="613" cy="145" r="5" fill="#3b82f6" stroke="#0a0a0f" stroke-width="2"/>
  <text x="613" y="135" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">92.5%</text>

  <!-- MemPalace dots + values -->
  <circle cx="193" cy="109.4" r="4" fill="#ef4444" stroke="#0a0a0f" stroke-width="2"/>
  <text x="193" y="126" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">96.6%</text>

  <circle cx="333" cy="106" r="4" fill="#ef4444" stroke="#0a0a0f" stroke-width="2"/>
  <text x="348" y="118" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">~97%</text>

  <circle cx="473" cy="175.2" r="4" fill="#ef4444" stroke="#0a0a0f" stroke-width="2"/>
  <text x="473" y="192" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">88.9%</text>

  <circle cx="613" cy="187.7" r="4" fill="#ef4444" stroke="#0a0a0f" stroke-width="2"/>
  <text x="613" y="204" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">~87%</text>

  <!-- Delta annotations -->
  <text x="193" y="146" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" opacity="0.9">+0.4%</text>
  <text x="333" y="146" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" opacity="0.9">+1.5%</text>
  <text x="473" y="216" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" opacity="0.9">+5.1%</text>
  <text x="613" y="228" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" opacity="0.9">+5.5%</text>

  <!-- Legend -->
  <rect x="220" y="385" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="240" y="397" fill="white" font-size="12" font-weight="600">MemoryPilot v4.0</text>
  <rect x="400" y="385" width="14" height="14" rx="3" fill="#ef4444"/>
  <text x="420" y="397" fill="white" font-size="12" font-weight="600">MemPalace v3.1</text>
